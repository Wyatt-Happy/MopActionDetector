# PoseYOLO 配置文件
# 拖地行为检测系统配置

# ==================== 设备配置 ====================
device:
  # 计算设备: cuda / cpu / auto
  type: "auto"
  # GPU 设备索引（多卡时指定）
  gpu_id: 0

# ==================== 模型配置 ====================
model:
  # 特征提取模型: resnet18 / resnet50
  backbone: "resnet18"
  # 是否使用预训练权重
  pretrained: true
  # 特征向量维度（ResNet18=512, ResNet50=2048）
  embedding_dim: 512
  # 是否启用 INT8 量化
  quantization:
    enabled: false
    backend: "fbgemm"  # fbgemm / qnnpack

# ==================== 视频处理配置 ====================
video:
  # 帧尺寸 (宽, 高)
  frame_size: [224, 224]
  # 采样帧数
  sample_frames: 32
  # 归一化均值 (ImageNet)
  normalize_mean: [0.485, 0.456, 0.406]
  # 归一化标准差 (ImageNet)
  normalize_std: [0.229, 0.224, 0.225]
  # 支持的格式
  supported_formats: [".mp4", ".avi", ".mov", ".mkv"]

# ==================== 实时流配置 ====================
stream:
  # 摄像头索引（0 为默认摄像头）
  camera_id: 0
  # 缓冲区大小
  buffer_size: 10
  # 采样间隔（秒）
  sample_interval: 2
  # 实时显示检测结果
  show_preview: true

# ==================== 数据库配置 ====================
database:
  # 数据库路径
  path: "E:/PoseYOLO/video_embedding_db"
  # 集合名称
  collection_name: "action_video_embeddings"
  # 集合元数据
  metadata:
    description: "拖地/非拖地行为视频特征向量库"
    version: "1.0"

# ==================== 检测配置 ====================
detection:
  # 拖地相似度阈值
  mopping_threshold: 0.75
  # 相似度差值阈值
  similarity_gap: 0.1
  # 匹配的 Top-K 样本数
  top_k: 1
  # 相似度计算方法: cosine / weighted / knn
  similarity_method: "cosine"
  # 加权相似度的权重配置
  weights:
    temporal: 0.3    # 时序权重
    spatial: 0.7     # 空间权重

# ==================== 自适应阈值配置 ====================
adaptive_threshold:
  # 是否启用自适应阈值
  enabled: false
  # 学习率
  learning_rate: 0.01
  # 历史数据窗口大小
  window_size: 100
  # 目标准确率
  target_accuracy: 0.95

# ==================== 日志配置 ====================
logging:
  # 日志级别: DEBUG / INFO / WARNING / ERROR
  level: "INFO"
  # 日志文件路径
  file: "logs/mopping_detection.log"
  # 日志格式
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  # 是否输出到控制台
  console: true
  # 日志轮转配置
  rotation:
    enabled: true
    max_bytes: 10485760  # 10MB
    backup_count: 5

# ==================== 导出配置 ====================
export:
  # 导出格式: csv / json / both
  format: "csv"
  # 导出目录
  output_dir: "exports"
  # 是否包含时间戳
  include_timestamp: true

# ==================== 并行处理配置 ====================
parallel:
  # 是否启用多线程
  enabled: true
  # 工作线程数（0 表示使用 CPU 核心数）
  workers: 0
  # 任务队列大小
  queue_size: 100
  # 批处理大小
  batch_size: 4

# ==================== API 服务配置 ====================
api:
  # 主机地址
  host: "0.0.0.0"
  # 端口
  port: 8000
  # 是否启用调试模式
  debug: false
  # 允许上传的最大文件大小（MB）
  max_file_size: 100
  # CORS 配置
  cors:
    enabled: true
    origins: ["*"]
  # Web 界面配置
  web_ui:
    enabled: true
    title: "拖地行为检测系统"
    theme: "light"

# ==================== 动作类型常量 ====================
actions:
  mopping: "mopping"
  non_mopping: "non_mopping"
