
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拖地行为检测系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-secondary {
            background: #6c757d;
        }
        .btn-success {
            background: #28a745;
        }
        .btn-danger {
            background: #dc3545;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        .result.success { background: #d4edda; color: #155724; }
        .result.error { background: #f8d7da; color: #721c24; }
        .result.info { background: #d1ecf1; color: #0c5460; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stat-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label { color: #666; margin-top: 5px; }
        #fileInput, #importFileInput { display: none; }
        .progress {
            width: 100%;
            height: 20px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            justify-content: center;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
        }
        .radio-group input[type="radio"] {
            margin-right: 8px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .video-preview {
            max-width: 100%;
            max-height: 300px;
            margin: 20px auto;
            display: none;
            border-radius: 10px;
        }
        .file-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e9ecef;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 拖地行为检测系统</h1>
        
        <div class="card">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('detect')">🔍 视频检测</div>
                <div class="tab" onclick="switchTab('import')">📥 导入视频</div>
            </div>
            
            <!-- 检测标签页 -->
            <div id="detectTab" class="tab-content active">
                <h2>上传视频检测</h2>
                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <p>点击或拖拽上传视频文件</p>
                    <p style="color: #999; margin-top: 10px;">支持 MP4, AVI, MOV, MKV 格式</p>
                </div>
                <input type="file" id="fileInput" accept=".mp4,.avi,.mov,.mkv" onchange="handleFileSelect(event)">
                <div class="progress" id="progress">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="result" id="result"></div>
            </div>
            
            <!-- 导入标签页 -->
            <div id="importTab" class="tab-content">
                <h2>导入视频到数据库</h2>
                <p style="color: #666; margin-bottom: 20px;">选择视频并标注是否为拖地视频，用于扩充训练数据</p>
                
                <div class="upload-area" onclick="document.getElementById('importFileInput').click()">
                    <p>📁 点击选择要导入的视频</p>
                    <p style="color: #999; margin-top: 10px;">支持 MP4, AVI, MOV, MKV 格式</p>
                </div>
                <input type="file" id="importFileInput" accept=".mp4,.avi,.mov,.mkv" onchange="handleImportFileSelect(event)">
                
                <div class="file-info" id="importFileInfo">
                    <strong>已选择文件:</strong> <span id="importFileName"></span>
                </div>
                
                <video id="videoPreview" class="video-preview" controls></video>
                
                <div class="radio-group">
                    <label>
                        <input type="radio" name="actionType" value="mopping" checked>
                        🧹 拖地视频
                    </label>
                    <label>
                        <input type="radio" name="actionType" value="non_mopping">
                        ❌ 非拖地视频
                    </label>
                </div>
                
                <div style="text-align: center;">
                    <button class="btn btn-success" onclick="importVideo()">确认导入</button>
                    <button class="btn btn-secondary" onclick="cancelImport()">取消</button>
                </div>
                
                <div class="progress" id="importProgress">
                    <div class="progress-bar" id="importProgressBar"></div>
                </div>
                <div class="result" id="importResult"></div>
            </div>
        </div>
        
        <div class="card">
            <h2>📊 数据库状态</h2>
            <div class="stats" id="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalCount">-</div>
                    <div class="stat-label">总视频数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="mopCount">-</div>
                    <div class="stat-label">拖地视频</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="nonMopCount">-</div>
                    <div class="stat-label">非拖地视频</div>
                </div>
            </div>
            <button class="btn" onclick="refreshStats()" style="margin-top: 20px;">刷新状态</button>
        </div>
        
        <div class="card">
            <h2>🔴 实时流检测</h2>
            <button class="btn" onclick="startStream()">启动摄像头检测</button>
            <button class="btn btn-danger" onclick="stopStream()">停止</button>
            <div id="streamResult" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        let selectedImportFile = null;
        
        // 页面加载时获取状态
        window.onload = refreshStats;
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            if (tabName === 'detect') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('detectTab').classList.add('active');
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('importTab').classList.add('active');
            }
        }
        
        async function refreshStats() {
            try {
                const response = await fetch('/db/status');
                const data = await response.json();
                document.getElementById('totalCount').textContent = data.total_count;
                document.getElementById('mopCount').textContent = data.mopping_count;
                document.getElementById('nonMopCount').textContent = data.non_mopping_count;
            } catch (error) {
                console.error('获取状态失败:', error);
            }
        }
        
        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            const progress = document.getElementById('progress');
            const progressBar = document.getElementById('progressBar');
            const result = document.getElementById('result');
            
            progress.style.display = 'block';
            progressBar.style.width = '50%';
            result.style.display = 'none';
            
            try {
                const response = await fetch('/detect', {
                    method: 'POST',
                    body: formData
                });
                
                progressBar.style.width = '100%';
                
                const data = await response.json();
                
                result.className = 'result ' + (data.is_mopping ? 'success' : 'error');
                result.innerHTML = `
                    <h3>${data.is_mopping ? '✅ 检测到拖地行为' : '❌ 未检测到拖地行为'}</h3>
                    <p>拖地相似度: ${data.mop_similarity.toFixed(4)}</p>
                    <p>非拖地相似度: ${data.non_mop_similarity.toFixed(4)}</p>
                    <p>置信度: ${data.details.confidence.toFixed(4)}</p>
                `;
                result.style.display = 'block';
                
            } catch (error) {
                result.className = 'result error';
                result.innerHTML = '<h3>❌ 检测失败</h3><p>' + error.message + '</p>';
                result.style.display = 'block';
            }
            
            setTimeout(() => {
                progress.style.display = 'none';
                progressBar.style.width = '0%';
            }, 1000);
        }
        
        function handleImportFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            selectedImportFile = file;
            
            // 显示文件信息
            document.getElementById('importFileName').textContent = file.name;
            document.getElementById('importFileInfo').style.display = 'block';
            
            // 预览视频
            const videoPreview = document.getElementById('videoPreview');
            videoPreview.src = URL.createObjectURL(file);
            videoPreview.style.display = 'block';
            
            // 隐藏之前的结果
            document.getElementById('importResult').style.display = 'none';
        }
        
        async function importVideo() {
            if (!selectedImportFile) {
                alert('请先选择视频文件');
                return;
            }
            
            // 获取选择的动作类型
            const actionType = document.querySelector('input[name="actionType"]:checked').value;
            
            const formData = new FormData();
            formData.append('file', selectedImportFile);
            formData.append('action_type', actionType);
            
            const progress = document.getElementById('importProgress');
            const progressBar = document.getElementById('importProgressBar');
            const result = document.getElementById('importResult');
            
            progress.style.display = 'block';
            progressBar.style.width = '50%';
            result.style.display = 'none';
            
            try {
                const response = await fetch('/db/add', {
                    method: 'POST',
                    body: formData
                });
                
                progressBar.style.width = '100%';
                
                const data = await response.json();
                
                if (data.success) {
                    result.className = 'result success';
                    result.innerHTML = `
                        <h3>✅ 导入成功</h3>
                        <p>文件: ${selectedImportFile.name}</p>
                        <p>类型: ${actionType === 'mopping' ? '🧹 拖地视频' : '❌ 非拖地视频'}</p>
                    `;
                    // 刷新数据库状态
                    refreshStats();
                    // 清空选择
                    cancelImport();
                } else {
                    result.className = 'result error';
                    result.innerHTML = '<h3>❌ 导入失败</h3><p>请检查文件格式</p>';
                }
                result.style.display = 'block';
                
            } catch (error) {
                result.className = 'result error';
                result.innerHTML = '<h3>❌ 导入失败</h3><p>' + error.message + '</p>';
                result.style.display = 'block';
            }
            
            setTimeout(() => {
                progress.style.display = 'none';
                progressBar.style.width = '0%';
            }, 1000);
        }
        
        function cancelImport() {
            selectedImportFile = null;
            document.getElementById('importFileInput').value = '';
            document.getElementById('importFileInfo').style.display = 'none';
            document.getElementById('videoPreview').style.display = 'none';
            document.getElementById('importResult').style.display = 'none';
        }
        
        async function startStream() {
            try {
                const response = await fetch('/stream/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({source: '0'})
                });
                const data = await response.json();
                alert(data.message);
                
                pollStreamResult();
            } catch (error) {
                alert('启动失败: ' + error.message);
            }
        }
        
        async function stopStream() {
            try {
                await fetch('/stream/stop', {method: 'POST'});
                alert('已停止');
            } catch (error) {
                alert('停止失败: ' + error.message);
            }
        }
        
        async function pollStreamResult() {
            const resultDiv = document.getElementById('streamResult');
            
            const poll = async () => {
                try {
                    const response = await fetch('/stream/result');
                    const data = await response.json();
                    
                    if (data.is_mopping !== undefined) {
                        resultDiv.innerHTML = `
                            <div class="result ${data.is_mopping ? 'success' : 'error'}" style="display: block;">
                                <h3>${data.is_mopping ? '✅ 拖地' : '❌ 非拖地'}</h3>
                                <p>时间: ${data.timestamp}</p>
                                <p>相似度: ${data.mop_similarity?.toFixed(4)}</p>
                            </div>
                        `;
                    }
                } catch (error) {
                    console.error('获取流结果失败:', error);
                }
            };
            
            setInterval(poll, 2000);
        }
    </script>
</body>
</html>
